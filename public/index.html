<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.x/css/materialdesignicons.min.css" rel="stylesheet" />
    <title>POS-IA — Sistema de Ventas</title>
    <style>
      body { background: #0a0f1e; margin: 0; font-family: 'Inter', sans-serif; }
      body.theme-light { background: #f0f4f8; }
      #app { min-height: 100vh; }
    </style>
  </head>
  <body>
    <script>
      (function() {
        try {
          var uid = null;
          var stored = localStorage.getItem('ide_ia_user');
          if (stored) { var u = JSON.parse(stored); uid = u && u.id; }
          var theme = (uid && localStorage.getItem('ide-theme-' + uid)) || localStorage.getItem('ide-theme');
          if (theme === 'light') document.body.classList.add('theme-light');
        } catch(e) {}
      })();
    </script>
    <noscript>
      <strong>POS-IA requiere JavaScript habilitado para funcionar.</strong>
    </noscript>
    <div id="app"></div>
  </body>
</html>
